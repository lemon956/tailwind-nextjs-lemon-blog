name: Sync Obsidian Blog

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write

concurrency:
  group: obsidian-blog-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install webdav-cli
        run: cargo install --git https://github.com/lemon956/obsidian-cli --locked --bin webdav-cli

      - name: Sync status done posts from Obsidian
        run: npm run sync:obsidian
        env:
          OBSIDIAN_WEBDAV_URL: ${{ secrets.OBSIDIAN_WEBDAV_URL }}
          OBSIDIAN_WEBDAV_USERNAME: ${{ secrets.OBSIDIAN_WEBDAV_USERNAME }}
          OBSIDIAN_WEBDAV_PASSWORD: ${{ secrets.OBSIDIAN_WEBDAV_PASSWORD }}
          OBSIDIAN_SYNC_SOURCE_DIR: ${{ vars.OBSIDIAN_SYNC_SOURCE_DIR || 'lemon/blog' }}
          OBSIDIAN_SYNC_OUTPUT_DIR: ${{ vars.OBSIDIAN_SYNC_OUTPUT_DIR || 'data/blog/obsidian' }}
          OBSIDIAN_SYNC_ASSET_OUTPUT_DIR: ${{ vars.OBSIDIAN_SYNC_ASSET_OUTPUT_DIR || 'public/static/obsidian' }}
          OBSIDIAN_SYNC_ASSET_DIRS: ${{ vars.OBSIDIAN_SYNC_ASSET_DIRS || '' }}
          OBSIDIAN_SYNC_WRITE_DIR: ${{ vars.OBSIDIAN_SYNC_WRITE_DIR || 'Inbox/Hermes' }}

      - name: Build generated content
        run: npm run build

      - name: Keep generated Next type file out of the sync commit
        run: git restore next-env.d.ts

      - name: Commit synced posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/blog/obsidian public/static/obsidian app/tag-data.json
          if git diff --cached --quiet; then
            echo "No Obsidian blog changes to commit."
          else
            git commit -m "chore: sync obsidian blog posts"
            git push
          fi
